name: integration

# The paid path: real browser + real VLM calls. Costs money, so it does NOT run on every
# push — only on a manual trigger or when you push a version tag (a release). Provide an
# OpenAI key (and optionally others) as repo Action secrets:
#   Settings → Secrets and variables → Actions → New repository secret → OPENAI_API_KEY
# Without the secret these tests skip (tests/conftest.py), so the job is a no-op, not a failure.
#
# Note: a tag pushed by the auto-tag release workflow (GITHUB_TOKEN) will NOT trigger this
# (GitHub blocks token-pushed events from chaining). Use "Run workflow" (workflow_dispatch),
# or push the tag yourself, to run it for a release.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  integration:
    name: integration (Linux · real browser + VLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install the browser
        run: uv run playwright install --with-deps chromium

      - name: Integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        run: uv run pytest -m integration -q
