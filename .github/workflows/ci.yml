name: ci

# One workflow per push (so you don't see two runs for the same commit): the cross-OS test
# matrix + the Linux desktop job, and THEN — only if those pass, only on push to main — the
# tag/release job. Cross-OS uses GitHub's free macOS/Windows/Linux runners; integration tests
# (keys + real browser) and desktop tests (live display) auto-skip via tests/conftest.py.

on:
  push:
    branches: [main, "release/**"]  # release/X.Y branches cut maintenance patches for older lines
  pull_request:

permissions:
  contents: read

env:
  PYTHONUTF8: "1"  # Windows console is cp1252 by default → ✓/→/… in output would crash

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20  # backstop: bound any real hang (pytest-timeout catches most first, at 90s)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Version files in sync (single source of truth)
        run: uv run python -m interact.versioning check

      - name: Run tests (integration + desktop auto-skip here)
        run: uv run pytest -m "not integration" -q

      # The macOS/Windows runners are real GUI sessions, so drive the PortableBackend (mss + pynput)
      # on them and SHOW the per-test result (-rs prints skip reasons): this is the visible mac/win
      # desktop-automation check (#24). Non-fatal — a host that denies Screen-Recording/Accessibility
      # skips with a diagnostic rather than failing.
      - name: Desktop automation (macOS/Windows real GUI)
        if: runner.os != 'Linux'
        run: uv run pytest tests/test_portable_backend.py -v -rs

  # Desktop automation CAN be tested in CI on Linux: Xvfb gives the runner a virtual
  # display, and the nested Xephyr sandbox drives real windows via xdotool/maim. (The
  # local uinput path needs /dev/uinput — privileged — so those tests stay opt-in/skipped.)
  desktop:
    name: desktop (Linux · Xvfb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Desktop deps (nested sandbox + a Tk-capable Python + recorder)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb xserver-xephyr xdotool maim x11-utils python3-tk ffmpeg
      - name: Nested desktop tests under a virtual display (recorded)
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x1024x24 >/dev/null 2>&1 &
          for _ in $(seq 1 30); do xdpyinfo -display :99 >/dev/null 2>&1 && break; sleep 0.5; done
          mkdir -p out
          # Record the virtual display so you can WATCH the runs afterwards (downloadable
          # artifact — runners are headless, but this is free within Actions storage limits).
          ffmpeg -y -loglevel error -f x11grab -video_size 1280x1024 -framerate 10 -i :99 \
            out/ci-desktop.mp4 >/dev/null 2>&1 &
          ff=$!
          uv run pytest tests/test_desktop_scenario.py -q; rc=$?
          kill "$ff" 2>/dev/null; sleep 1
          exit $rc
      - name: Upload the recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-recording
          path: out/ci-desktop.mp4
          if-no-files-found: warn

  # Tag + GitHub release — ONLY after the matrix + desktop jobs pass, and only on push to
  # main. Never tags a broken build. Single source of truth = pyproject.toml version (must
  # match package.json); no-ops if the tag already exists, so re-pushes are safe.
  release:
    needs: [test, desktop]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag.outputs.created }}
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read & verify version
        id: version
        run: |
          py=$(sed -nE 's/^version *= *"([^"]+)".*/\1/p' pyproject.toml | head -1)
          ext=$(sed -nE 's/.*"version" *: *"([^"]+)".*/\1/p' vscode-extension/package.json | head -1)
          if [ -z "$py" ]; then echo "::error::no version in pyproject.toml"; exit 1; fi
          if [ -n "$ext" ] && [ "$ext" != "$py" ]; then
            echo "::error::version mismatch — pyproject.toml=$py but package.json=$ext"; exit 1
          fi
          echo "version=$py" >> "$GITHUB_OUTPUT"
      - name: Create & push tag if new
        id: tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "$tag exists — nothing to do"; echo "created=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "interact $tag"
          git push origin "$tag"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: GitHub release
        if: steps.tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true

  # Publish the VS Code extension to the Marketplace and Open VSX. Each step self-skips when
  # its token secret is absent, so the job (and the compile check) still runs on every release
  # without failing before the tokens are configured. Secrets: VSCE_PAT (Azure DevOps PAT,
  # Marketplace manage scope) and OVSX_PAT (open-vsx.org access token).
  publish-extension:
    needs: release
    if: ${{ needs.release.outputs.created == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv  # compile runs the Python type/data generators
        uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install extension deps
        run: npm ci
      - name: Build (compile + bundle) — also a per-release build check
        run: npm run compile
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish -p "$VSCE_PAT"
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish -p "$OVSX_PAT"
